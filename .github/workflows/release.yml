name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build app bundle
        run: |
          go build -o brb.app/Contents/MacOS/brb main.go
          mkdir -p brb.app/Contents/Resources
          cp Info.plist brb.app/Contents/
          cp appIcon.icns brb.app/Contents/Resources/

      - name: Zip app bundle
        run: zip -r brb.app.zip brb.app

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} brb.app.zip
